name: Halo
options:
  bundleIdPrefix: app.halo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: it

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_COMPILATION_MODE: wholemodule

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"
  HaloShared:
    path: HaloShared

targets:
  HaloApp:
    type: application
    platform: iOS
    sources:
      - path: HaloApp
    dependencies:
      - package: Supabase
        product: Supabase
      - target: HaloWidget
        embed: true
      - package: HaloShared
        product: HaloShared
    info:
      path: HaloApp/Info.plist
      properties:
        CFBundleDisplayName: Halo
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Halo usa la fotocamera per i tuoi post effimeri.
        NSMicrophoneUsageDescription: Halo usa il microfono per registrare le note audio dei tuoi post.
        NSPhotoLibraryUsageDescription: Halo accede alle foto per pubblicare i tuoi post effimeri.
        CFBundleURLTypes:
          - CFBundleURLName: app.halo.deeplink
            CFBundleURLSchemes:
              - $(HALO_URL_SCHEME)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        APP_GROUP_ID: $(APP_GROUP_ID)
    entitlements:
      path: HaloApp/HaloApp.entitlements
      properties:
        com.apple.security.application-groups:
          - $(APP_GROUP_ID)
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.halo.ios
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

  HaloWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HaloWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - package: HaloShared
        product: HaloShared
    info:
      path: HaloWidget/Info.plist
      properties:
        CFBundleDisplayName: Halo
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        APP_GROUP_ID: $(APP_GROUP_ID)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    entitlements:
      path: HaloWidget/HaloWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - $(APP_GROUP_ID)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.halo.ios.widget
        TARGETED_DEVICE_FAMILY: "1"

