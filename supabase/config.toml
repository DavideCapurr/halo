# Halo — Supabase local config
# Docs: https://supabase.com/docs/guides/local-development/cli/config

project_id = "halo"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "halo://auth"
additional_redirect_urls = ["halo://auth"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

# Sign in with Apple — da configurare in dashboard prod; locale è finto
[auth.external.apple]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.purge-expired]
verify_jwt = false

[functions.campaign-connect-onboard]
verify_jwt = true

[functions.campaign-create-payment]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false
